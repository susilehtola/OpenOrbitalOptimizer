name: Build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "9 16 * * 1"

jobs:
  build-test-repo:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - lane: linux-gnu
            runs-on: ubuntu-latest
            python-version: "3.12"
            cmargs: ""
          - lane: linux-clang
            runs-on: ubuntu-latest
            python-version: "3.12"
            cmargs: >
              -D CMAKE_CXX_COMPILER=clang++
          - lane: linux-icpx
            runs-on: ubuntu-latest
            python-version: "3.12"
            cmargs: >
              -D CMAKE_CXX_COMPILER=icpx
          - lane: linux-arm64-gnu
            runs-on: ubuntu-24.04-arm
            python-version: "3.12"
            cmargs: ""
          - lane: macos-silicon-clang
            runs-on: macos-latest
            python-version: "3.12"
            cmargs: ""
          - lane: windows-clang
            runs-on: windows-latest
            python-version: "3.12"
            cmargs: >
              -D CMAKE_CXX_COMPILER=clang-cl
              -D CMAKE_CXX_FLAGS="-I${CONDA_PREFIX}\\Library\\include"

    name: "Repo • 🐍 ${{ matrix.cfg.python-version }} • ${{ matrix.cfg.lane }}"
    runs-on: ${{ matrix.cfg.runs-on }}
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - name: Checkout OpenOrbitalOptimizer
      uses: actions/checkout@v5

    - name: Prepare compiler environment, vcvarsall (W)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Write a Conda Env File
      run: |
        cat > export.yaml <<EOF
        name: test
        channels:
          - conda-forge
        dependencies:
          - cmake
          - ninja
          - cxx-compiler
          - armadillo
          - libxc-c
          - nlohmann_json
          - integratorxx
          - catch2  # for IntXX
          - libblas * *netlib  # netlib compensates for faulty conda windows config
          - liblapack * *netlib
          #- dummy1
        EOF
        if [[ "${{ matrix.cfg.lane }}" == "linux-icpx" ]]; then
          sed -i "s/#- dummy1/- dpcpp_linux-64/g" export.yaml
        fi
        if [[ "${{ matrix.cfg.lane }}" == "linux-clang" ]]; then
          echo "  - clang_linux-64" >> export.yaml
          echo "  - clangxx_linux-64" >> export.yaml
        fi
        cat export.yaml

    - name: Create Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.cfg.python-version }}
        activate-environment: test
        channels: conda-forge
        environment-file: export.yaml
        show-channel-urls: true
        auto-activate: false
        add-pip-as-python-dependency: true
        conda-remove-defaults: true

    - name: Environment Information
      run: |
        conda info
        conda list

    - name: Build & Install OpenOrbitalOptimizer
      run: |
        cmake \
          -S . \
          -B build \
          -G "Ninja" \
          -D CMAKE_BUILD_TYPE=Release \
          -D CMAKE_INSTALL_PREFIX="${{github.workspace}}/installed" \
          -D CMAKE_CXX_COMPILER=${CXX} \
          -D CMAKE_PREFIX_PATH="${CONDA_PREFIX};${CONDA_PREFIX}/Library" \
          ${{ matrix.cfg.cmargs }}
        cmake --build build --target install

    - name: Test
      run: ctest --output-on-failure --test-dir build/

    - name: Testing find_package Consumption
      run: |
        mkdir consume_fp && cd consume_fp
        cat > CMakeLists.txt <<EOF
        cmake_minimum_required(VERSION 3.16)
        project(atomtest LANGUAGES CXX)
        find_package(OpenOrbitalOptimizer CONFIG REQUIRED)
        add_executable(atomtest EXCLUDE_FROM_ALL "../tests/atomtest.cpp")
        target_include_directories(atomtest PRIVATE "../tests/")
        find_package(Libxc CONFIG REQUIRED)
        find_package(IntegratorXX CONFIG REQUIRED)
        find_package(nlohmann_json CONFIG REQUIRED)
          include(CMakePrintHelpers)
          cmake_print_properties(
            TARGETS
              armadillo
              IntegratorXX::IntegratorXX
              OpenOrbitalOptimizer::OpenOrbitalOptimizer
            PROPERTIES
              IMPORTED_LINK_DEPENDENT_LIBRARIES
              IMPORTED_LOCATION
              INTERFACE_LOCATION
              INTERFACE_LINK_LIBRARIES
              INTERFACE_INCLUDE_DIRECTORIES
              INTERFACE_COMPILE_DEFINITIONS
              INTERFACE_COMPILE_OPTIONS
              INTERFACE_SYSTEM_INCLUDE_DIRECTORIES
            )
        target_link_libraries(
          atomtest
            OpenOrbitalOptimizer::OpenOrbitalOptimizer
            Libxc::xc
            IntegratorXX::IntegratorXX
            nlohmann_json::nlohmann_json
          )
        EOF
        cmake . -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{github.workspace}}/installed" ${{ matrix.cfg.cmargs }}
        cmake --build . --target atomtest
        ./atomtest --Z 8 --xfunc GGA_X_PBE --cfunc GGA_C_PBE --M 3 --sto 0 --basis "${{github.workspace}}/tests/cc-pvdz.json"

  build-test-python:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - lane: linux-gnu
            runs-on: ubuntu-latest
          - lane: linux-arm64-gnu
            runs-on: ubuntu-24.04-arm
          - lane: macos-silicon-clang
            runs-on: macos-latest
        python-version: ["3.11", "3.12", "3.13"]

    name: "Python • 🐍 ${{ matrix.python-version }} • ${{ matrix.cfg.lane }}"
    runs-on: ${{ matrix.cfg.runs-on }}
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - name: Checkout OpenOrbitalOptimizer
      uses: actions/checkout@v5

    - name: Write a Conda Env File
      run: |
        cat > export-py.yaml <<EOF
        name: test-py
        channels:
          - conda-forge
        dependencies:
          - cmake
          - ninja
          - cxx-compiler
          - armadillo
          - pybind11
          - numpy
          - pytest
          - pyscf
        EOF
        cat export-py.yaml

    - name: Create Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        activate-environment: test-py
        channels: conda-forge
        environment-file: export-py.yaml
        show-channel-urls: true
        auto-activate: false
        add-pip-as-python-dependency: true
        conda-remove-defaults: true

    - name: Environment Information
      run: |
        conda info
        conda list

    - name: Build OpenOrbitalOptimizer Python bindings
      run: |
        cmake \
          -S . \
          -B build-py \
          -G "Ninja" \
          -D CMAKE_BUILD_TYPE=Release \
          -D OpenOrbitalOptimizer_BUILD_PYTHON=ON \
          -D OpenOrbitalOptimizer_BUILD_TESTING=OFF \
          -D CMAKE_CXX_COMPILER=${CXX} \
          -D CMAKE_PREFIX_PATH="${CONDA_PREFIX}"
        cmake --build build-py

    - name: Run Python tests
      run: |
        PYTHONPATH="${PWD}/build-py/python" python -m pytest -v python/tests

  release_docs:
    timeout-minutes: 15
    needs: [build-test-repo]
    permissions:
      contents: write
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - label: MkDocs
            python-version: "3.12"
            runs-on: ubuntu-latest

    name: "🐍 ${{ matrix.cfg.python-version }} • ${{ matrix.cfg.label }}"
    runs-on: ${{ matrix.cfg.runs-on }}

    steps:
    - uses: actions/checkout@v5

    - name: Write a Conda Env File
      run: |
          cat > export.yaml <<EOF
          name: test
          channels:
            - conda-forge
            - nodefaults
          dependencies:
            # Core
            - python
            # Docs
            - mkdocs
            - mkdocs-material
            - doxygen
            - pip
            - pip:
              - mkdoxy
          EOF
          cat export.yaml

    - name: Create Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: test
        environment-file: export.yaml
        python-version: ${{ matrix.cfg.python-version }}
        auto-activate: false
        show-channel-urls: true
        add-pip-as-python-dependency: true
        channels: conda-forge,nodefaults

    - name: Environment Information
      run: |
        conda info
        conda list --show-channel-urls

    - name: Build Documentation
      run: |
        mkdocs build

    - name: GitHub Pages Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      if: github.event_name == 'push' && github.repository == 'susilehtola/OpenOrbitalOptimizer' && ( startsWith(github.ref, 'refs/tags/' ) || github.ref == 'refs/heads/master' )
      with:
        branch: gh-pages
        folder: site
